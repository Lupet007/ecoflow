name: EcoFlow CI Pipeline

on:
  push:
    branches:
      - '**'
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  backend-tests:
    name: Backend Tests with PostgreSQL
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgis/postgis:16-3.4
        env:
          POSTGRES_DB: ecoflow
          POSTGRES_USER: ecoflow
          POSTGRES_PASSWORD: ecoflow
        ports:
          - 5433:5432
        options: >-
          --health-cmd "pg_isready -U ecoflow -d ecoflow"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Make Maven wrapper executable
        run: chmod +x mvnw

      - name: Run backend tests
        run: ./mvnw clean test -Dspring.profiles.active=test

      - name: Build backend
        run: ./mvnw clean package -DskipTests

  frontend-build:
    name: Frontend Build
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.19.0'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

  python-pipeline-check:
    name: Python Pipeline Check
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: pipeline

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Validate Python syntax
        run: python -m py_compile main.py scheduler.py

  sonarqube-analysis:
    name: SonarQube Code Analysis
    runs-on: ubuntu-latest
    needs:
      - backend-tests
      - frontend-build
      - python-pipeline-check

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Make Maven wrapper executable
        working-directory: backend
        run: chmod +x mvnw

      - name: Build backend with coverage for SonarQube
        working-directory: backend
        run: ./mvnw clean verify -Dspring.profiles.active=test

      - name: SonarCloud Scan
        uses: SonarSource/sonarqube-scan-action@v3.1.0
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          args: >
            -Dsonar.projectKey=Lupet007_ecoflow
            -Dsonar.organization=lupet007
            -Dsonar.host.url=https://sonarcloud.io
            -Dsonar.sources=backend/src/main/java,frontend/src,pipeline
            -Dsonar.tests=backend/src/test/java
            -Dsonar.java.binaries=backend/target/classes
            -Dsonar.coverage.jacoco.xmlReportPaths=backend/target/site/jacoco/jacoco.xml
            -Dsonar.exclusions=**/node_modules/**,**/dist/**,**/target/**,**/.mvn/**,**/mvnw,**/mvnw.cmd,**/*.drawio,**/coverage/**,**/package-lock.json
            -Dsonar.coverage.exclusions=frontend/src/**,pipeline/**
            -Dsonar.cpd.exclusions=frontend/src/**