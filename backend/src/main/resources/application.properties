spring.application.name=backend
server.port=${PORT:8080}

spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5433}/${DB_NAME:ecoflow}
spring.datasource.username=${DB_USER:ecoflow}
spring.datasource.password=${DB_PASSWORD:ecoflow}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# Set JWT_SECRET on the hosting provider to a freshly generated value in
# production - never reuse this dev-only placeholder there. It's deliberately
# a plain, descriptive string (not a random-looking token) so it reads
# unambiguously as a local-only default rather than a real secret.
jwt.secret=${JWT_SECRET:local-development-only-jwt-secret-do-not-use-in-production}