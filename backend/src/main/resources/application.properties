spring.application.name=backend

# Local dev keeps working unchanged (these are the same values as before) -
# only setting DB_URL/DB_USERNAME/DB_PASSWORD as real environment variables on
# the hosting provider overrides them for the deployed database.
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5433/ecoflow}
spring.datasource.username=${DB_USERNAME:ecoflow}
spring.datasource.password=${DB_PASSWORD:ecoflow}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# Same idea: set JWT_SECRET on the hosting provider to a freshly generated
# value in production - never reuse this dev-only placeholder there. It's
# deliberately a plain, descriptive string (not a random-looking token) so it
# reads unambiguously as a local-only default rather than a real secret.
jwt.secret=${JWT_SECRET:local-development-only-jwt-secret-do-not-use-in-production}

# Comma-separated list of origins allowed to call this API. Set
# CORS_ALLOWED_ORIGINS on the hosting provider to include the deployed
# frontend's real URL once it exists.
cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173}