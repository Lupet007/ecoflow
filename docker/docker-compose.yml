services:
  postgres:
    image: postgis/postgis:16-3.4
    container_name: ecoflow-db
    environment:
      POSTGRES_DB: ecoflow
      POSTGRES_USER: ecoflow
      POSTGRES_PASSWORD: ecoflow
    ports:
      - "5433:5432"
    volumes:
      - ecoflow_postgres_data:/var/lib/postgresql/data

  succulent:
    image: codeberg.org/firefly-cpp/succulent:v6
    container_name: ecoflow-succulent
    ports:
      - "9090:8080"
    volumes:
      - ../succulent/run.py:/succulent-app/run.py
      - ../succulent/configuration.yml:/succulent-app/configuration.yml
      # Without this, the recorded CSV lives only in the container's writable
      # layer and is silently wiped every time the container is recreated.
      - succulent_data:/succulent-app/data
    environment:
      # The succulent library reads the whole CSV, modifies it in memory, then
      # writes it back (not an atomic append) - concurrent workers writing to
      # the same file can silently lose each other's data. One worker is
      # correct for this single shared CSV store.
      - GUNICORN_WORKERS=1

volumes:
  ecoflow_postgres_data:
  succulent_data: